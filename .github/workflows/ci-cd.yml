name: CI/CD Pipeline

on:
  push:
    branches: [ master, develop ]
  pull_request:
    branches: [ master ]

env:
  JAVA_VERSION: '21'
  NODE_VERSION: '20'

jobs:
  backend-build:
    name: Backend Build & Test
    runs-on: ubuntu-latest

    services:
      mysql:
        image: mysql:8.4
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: hotel
          MYSQL_USER: hotel_user
          MYSQL_PASSWORD: hotel_pass
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h 127.0.0.1"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

      redis:
        image: redis:7.2-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd="redis-cli ping"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: 'temurin'
          cache: 'maven'

      - name: Initialize Database
        run: |
          mysql -h 127.0.0.1 -u root -proot hotel < db/create_hotel.sql
          mysql -h 127.0.0.1 -u root -proot hotel < db/create_users.sql

      - name: Build Backend
        working-directory: ./Hms Backend
        run: ./mvnw clean package -DskipTests

      - name: Run Tests
        working-directory: ./Hms Backend
        env:
          DB_URL: jdbc:mysql://127.0.0.1:3306/hotel
          DB_USERNAME: hotel_user
          DB_PASSWORD: hotel_pass
          REDIS_HOST: 127.0.0.1
          REDIS_PORT: 6379
          REDIS_PASSWORD: ""
          JWT_SECRET: ciTestSecretKeyForGitHubActions2024
        run: ./mvnw test

      - name: Upload Build Artifact
        uses: actions/upload-artifact@v4
        with:
          name: backend-jar
          path: Hms Backend/target/*.jar

  frontend-build:
    name: Frontend Build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: 'Hms Frontend/package-lock.json'

      - name: Install Dependencies
        working-directory: ./Hms Frontend
        run: npm install

      - name: Build Frontend
        working-directory: ./Hms Frontend
        run: npm run build

      - name: Upload Build Artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: Hms Frontend/dist

  docker-build:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: [backend-build, frontend-build]
    if: github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v4

      - name: Build Docker Images
        run: |
          docker compose build --no-cache
