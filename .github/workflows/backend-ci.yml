name: backend-ci

on:
  pull_request:
    branches:
      - develop
      - maater

jobs:
  build-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: maven
      - name: Run tests
        working-directory: Hotel Management Backend
        run: mvn -B test
      - name: Build jar
        working-directory: Hotel Management Backend
        run: mvn -B -DskipTests package
