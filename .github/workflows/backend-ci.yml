name: Backend CI

on:
  push:
    branches: [develop, master]
    paths:
      - 'Hms Backend/**'
      - 'db/**'
  pull_request:
    branches: [develop, master]
    paths:
      - 'Hms Backend/**'
      - 'db/**'

jobs:
  build-and-test:
    name: Build & Test Backend
    runs-on: ubuntu-latest

    services:
      mysql:
        image: mysql:8.4
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: hotel
          MYSQL_USER: hotel_user
          MYSQL_PASSWORD: hotel_pass
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h 127.0.0.1"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

      redis:
        image: redis:7.2-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd="redis-cli ping"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven

      - name: Initialize Database Schema
        run: |
          mysql -h 127.0.0.1 -u root -proot hotel < db/create_hotel.sql
          mysql -h 127.0.0.1 -u root -proot hotel < db/create_users.sql

      - name: Run Tests
        working-directory: ./Hms Backend
        env:
          DB_URL: jdbc:mysql://127.0.0.1:3306/hotel
          DB_USERNAME: hotel_user
          DB_PASSWORD: hotel_pass
          REDIS_HOST: 127.0.0.1
          REDIS_PORT: 6379
          REDIS_PASSWORD: ""
          JWT_SECRET: ciTestSecretKeyForGitHubActions2024HMS
          SPRING_PROFILES_ACTIVE: test
        run: ./mvnw -B clean test

      - name: Build JAR (only if tests pass)
        working-directory: ./Hms Backend
        run: ./mvnw -B -DskipTests package

      - name: Upload Test Reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-reports
          path: Hms Backend/target/surefire-reports/

      - name: Upload Build Artifact
        uses: actions/upload-artifact@v4
        with:
          name: backend-jar
          path: Hms Backend/target/*.jar
