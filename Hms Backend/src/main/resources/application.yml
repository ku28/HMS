spring:
  application:
    name: hotel-management-backend
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}
  data:
    rest:
      base-path: /api
      default-page-size: ${REST_DEFAULT_PAGE_SIZE:20}
      max-page-size: ${REST_MAX_PAGE_SIZE:100}
      page-param-name: page
      limit-param-name: size
      sort-param-name: sort
      return-body-on-create: true
      return-body-on-update: true

server:
  port: ${SERVER_PORT:8080}
  servlet:
    context-path: /

# Common configuration
jwt:
  secret: ${JWT_SECRET:defaultSecretKeyForDevelopmentOnlyChangeInProduction2026HMS}
  expiration: ${JWT_EXPIRATION:86400000}

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
    enabled: true
