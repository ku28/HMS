spring:
  datasource:
    url: ${DB_URL:jdbc:mysql://127.0.0.1:3306/hotel}
    username: ${DB_USERNAME:hotel_user}
    password: ${DB_PASSWORD:hotel_pass}
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      maximum-pool-size: 5
      minimum-idle: 2
      idle-timeout: 30000
      max-lifetime: 60000
      connection-timeout: 10000

  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: true
    database-platform: org.hibernate.dialect.MySQLDialect
    properties:
      hibernate:
        format_sql: true
        physical_naming_strategy: org.hibernate.boot.model.naming.PhysicalNamingStrategyStandardImpl

  data:
    redis:
      host: ${REDIS_HOST:127.0.0.1}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
      timeout: 3000

  cache:
    type: none

server:
  port: 0

jwt:
  secret: ${JWT_SECRET:testSecretKeyForUnitTestingOnly2026HotelManagement}
  expiration: 86400000

logging:
  level:
    com.hotelmanagement: DEBUG
    org.springframework.security: DEBUG
    org.hibernate.SQL: DEBUG
